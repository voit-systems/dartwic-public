name: "labjack_t7_module"
title: "LabJack T7 Module"
description: "LabJack T7 module implemented with the DARTWIC C++ module system."
author: "Voit Systems"
version: "1.0"
icon_image_src: "https://support.labjack.com/hc/theming_assets/01HZP269E80JDK2GRYRMXJ4CP1"

ui:
  categories:
    - category: "Device Setup"
      parameters:
        device_name:
          default: "labjackT7"
          input:
            type: "discrete_input"
            label: "Device Name"
            placeholder: "labjackT7"

        device_type:
          default: "T7"
          input:
            type: "discrete_input"
            label: "Device Type"
            placeholder: "T7"

        connection_type:
          default: "ANY"
          input:
            type: "discrete_input"
            label: "Connection Type"
            placeholder: "ANY"

        identifier:
          default: "ANY"
          input:
            type: "discrete_input"
            label: "Identifier"
            placeholder: "ANY or LJM_DEMO_MODE"

        analog_channel_list:
          default: "AIN0"
          input:
            type: "discrete_input"
            label: "Analog Channel List"
            placeholder: "AIN0, AIN1, AIN2"

        target_scan_rate:
          default: 1000
          input:
            type: "numerical_input"
            label: "Target Scan Rate"
            placeholder: "1000"

        scans_per_read:
          default: 100
          input:
            type: "numerical_input"
            label: "Scans Per Read"
            placeholder: "100"
